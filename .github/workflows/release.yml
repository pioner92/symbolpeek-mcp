name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""
            archive: tar
            asset_suffix: tar.gz
            smoke: true
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            exe_suffix: ""
            archive: tar
            asset_suffix: tar.gz
            smoke: false
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            exe_suffix: ""
            archive: tar
            asset_suffix: tar.gz
            smoke: false
          - runner: macos-15
            target: aarch64-apple-darwin
            exe_suffix: ""
            archive: tar
            asset_suffix: tar.gz
            smoke: false
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            exe_suffix: ".exe"
            archive: zip
            asset_suffix: zip
            smoke: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install bundled TypeScript runtime
        run: npm ci --omit=dev
      - name: Build release binaries
        run: cargo build --locked --release --target ${{ matrix.target }} --bin symbolpeek --bin sym
      - name: Verify binary version
        shell: bash
        run: target/${{ matrix.target }}/release/symbolpeek${{ matrix.exe_suffix }} --version
      - name: Verify agent guidance installation
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/symbolpeek-codex
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/symbolpeek-claude
        run: target/${{ matrix.target }}/release/symbolpeek${{ matrix.exe_suffix }} install-skills all
      - name: Run release smoke test
        if: matrix.smoke
        run: node scripts/smoke-test.mjs target/${{ matrix.target }}/release/symbolpeek
      - name: Package Unix release
        if: matrix.archive == 'tar'
        run: sh scripts/package-release.sh ${{ matrix.target }} ${{ matrix.exe_suffix }}
      - name: Verify bundled runtime from release archive
        if: matrix.smoke
        run: sh scripts/verify-release-package.sh ${{ matrix.target }}
      - name: Package Windows release
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $PackageName = "symbolpeek-${{ matrix.target }}"
          $PackageDir = Join-Path "dist" $PackageName
          $Archive = Join-Path "dist" "$PackageName.zip"
          New-Item -ItemType Directory -Force (Join-Path $PackageDir "node_modules") | Out-Null
          New-Item -ItemType Directory -Force (Join-Path $PackageDir "skills") | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/symbolpeek.exe" $PackageDir
          Copy-Item "target/${{ matrix.target }}/release/sym.exe" $PackageDir
          Copy-Item -Recurse "node_modules/typescript" (Join-Path $PackageDir "node_modules")
          Copy-Item -Recurse "skills/symbolpeek" (Join-Path $PackageDir "skills")
          Copy-Item "README.md", "MCP_TOOLS.md", "LICENSE" $PackageDir
          Compress-Archive -Path $PackageDir -DestinationPath $Archive -Force
          $Hash = (Get-FileHash -Algorithm SHA256 $Archive).Hash.ToLowerInvariant()
          "$Hash  $PackageName.zip" | Set-Content -NoNewline "$Archive.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/symbolpeek-${{ matrix.target }}.${{ matrix.asset_suffix }}*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Compose release notes from CHANGELOG
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          # Section between "## [x.y.z]" and the next "## " heading.
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md >section.md
          # Trim leading and trailing blank lines.
          awk 'NF {p=1} p' section.md |
            awk '{l[NR]=$0} END {last=NR; while (last>0 && l[last] ~ /^[[:space:]]*$/) last--; for (i=1; i<=last; i++) print l[i]}' \
            >release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section for $version; falling back to generated notes." >&2
            exit 0
          fi
          previous_tag=$(git describe --tags --abbrev=0 "$RELEASE_TAG^" 2>/dev/null || true)
          {
            echo
            echo "## Install"
            echo
            echo '```sh'
            echo "curl -fsSL https://raw.githubusercontent.com/$REPOSITORY/main/scripts/install.sh | sh"
            echo '```'
            echo
            echo '```powershell'
            echo "irm https://raw.githubusercontent.com/$REPOSITORY/main/scripts/install.ps1 | iex"
            echo '```'
            echo
            echo "Then connect the server to your client — the installer prints the exact command."
            echo "See the [README](https://github.com/$REPOSITORY#quick-start) for requirements and troubleshooting."
            if [ -n "$previous_tag" ]; then
              echo
              echo "**Full Changelog**: https://github.com/$REPOSITORY/compare/$previous_tag...$RELEASE_TAG"
            fi
          } >>release-notes.md
      - name: Create release and upload binaries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Only packaged artifacts — the checkout also puts dist/README.md here.
          assets=(dist/symbolpeek-*)
          if [ -s release-notes.md ]; then
            notes=(--notes-file release-notes.md)
          else
            notes=(--generate-notes)
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            if [ -s release-notes.md ]; then
              gh release edit "$RELEASE_TAG" --notes-file release-notes.md
            fi
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              "${notes[@]}"
          fi
