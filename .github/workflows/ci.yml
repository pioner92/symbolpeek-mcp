name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: npm ci
      - run: sh -n scripts/install.sh scripts/package-release.sh scripts/verify-release-package.sh scripts/build-release.sh scripts/run-release.sh
      - run: cargo fmt --all -- --check
      - run: cargo test --all-targets
      - run: cargo clippy --all-targets --all-features -- -D warnings
