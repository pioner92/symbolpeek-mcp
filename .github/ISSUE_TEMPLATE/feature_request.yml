name: Feature request
description: Suggest a capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do
      description: The agent workflow or task that is awkward today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
      description: What SymbolPeek would return, and for which languages.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: What you do instead today
      description: Existing tools or workarounds, and why they fall short.
