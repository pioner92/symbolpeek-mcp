name: Bug report
description: Something in SymbolPeek does not work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please check [Troubleshooting](https://github.com/pioner92/symbolpeek-mcp#troubleshooting)
        first — most setup problems are covered there.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you expected, and what you got instead.
    validations:
      required: true
  - type: textarea
    id: call
    attributes:
      label: Tool call and response
      description: The exact tool name and arguments, plus the full response or error.
      render: json
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SymbolPeek version
      description: Output of `symbolpeek --version`.
      placeholder: "0.3.1"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS, architecture, and MCP client
      placeholder: "macOS 15 arm64, Claude Code"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`. Required for any TypeScript/JavaScript issue.
      placeholder: "v20.11.0"
  - type: textarea
    id: repro
    attributes:
      label: Minimal source snippet
      description: The smallest file content that reproduces the wrong result.
      render: text
